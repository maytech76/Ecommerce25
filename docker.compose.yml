version: '3.8'

services:
  # Base de datos
  mysql:
    image: mysql:8.0
    container_name: biciaventura-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-Bici072026}  # ✅ CORREGIDO
      MYSQL_DATABASE: ${DB_DATABASE:-ecommerce25}            # ✅ CORREGIDO
      MYSQL_USER: ${DB_USERNAME:-biciaventura}               # ✅ CORREGIDO
      MYSQL_PASSWORD: ${DB_PASSWORD:-biciaventura26}         # ✅ CORREGIDO
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      - laravel-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP-FPM
  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: biciaventura-php
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-ecommerce25}
      - DB_USERNAME=${DB_USERNAME:-biciaventura}
      - DB_PASSWORD=${DB_PASSWORD:-biciaventura26}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_URL=${APP_URL:-http://tu-ip-aqui}
      - APP_KEY=${APP_KEY}
    volumes:
      - storage_data:/var/www/html/storage
      - bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - laravel-network

  # Nginx (Servidor Web)
  nginx:
    image: nginx:alpine
    container_name: biciaventura-nginx
    restart: unless-stopped
    depends_on:
      - php-fpm
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - storage_data:/var/www/html/storage:ro
    networks:
      - laravel-network

volumes:
  mysql_data:
  storage_data:
  bootstrap_cache:

networks:
  laravel-network:
    driver: bridge